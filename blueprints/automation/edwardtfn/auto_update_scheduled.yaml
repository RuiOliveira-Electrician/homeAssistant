blueprint:
  name: Home Assistant Auto-update on a schedule base
  author: Edward Firmo (https://github.com/edwardtfn)
  homeassistant:
    min_version: 2025.8.0
  description: "# Home Assistant Auto-update\nUpdate Home Assistant automatically
    when a new update is available.\n## v2025.12.1\n## Attention:\n- Home Assistant
    may restart automatically as part of the update process.\n- **Use under your own
    risk!** Please see the discussions on Home Assistant community around the risks
    involved on auto-updating the system.\n- Ensure you have reliable backups before
    enabling automatic updates.\n- Auto-updates in production environments may lead
    to system instability.\n- Updates may affect connected devices and integrations.\n##
    For discussions:\n  - [Home Assistant Community portal](https://community.home-assistant.io/t/459281)\n\n##
    For support, bug reports and new ideas:\n  - [GitHub Issues](https://github.com/edwardtfn/ha_auto_update_scheduled/issues)\n"
  domain: automation
  source_url: https://raw.githubusercontent.com/edwardtfn/HomeAssistant-Config/main/blueprints/automation/EdwardTFN/auto_update_scheduled.yaml
  input:
    when_section:
      name: When (Schedule, etc.)
      icon: mdi:calendar
      description: Select when the updates should happen and when it should be skipped.
      collapsed: false
      input:
        schedule_entity:
          name: Schedule entity
          description: 'You can create a [Schedule](https://www.home-assistant.io/integrations/schedule)
            under [Settings > Devices & Services > Helpers](https://my.home-assistant.io/redirect/config_flow_start/?domain=schedule).

            Note => The schedule windows will define when an update will start. It
            is possible that a backup, an update or a restart process finishes after
            the schedule window, but new updates won''t start outside the schedule
            windows.

            '
          default: []
          selector:
            entity:
              multiple: false
              domain:
              - schedule
              reorder: false
        schedule_monthday_earliest:
          name: Earliest day in the month to run the update process
          description: "Usually a new major version of Home Assistant is available
            on the begining of every month. Some people consider those releases as
            not stable enough and prefer to avoid those versions, not updating the
            system until the mid of the month (day 15).\nNotes:\n  - If you select
            a day higher than 28 the updates won't run every month.\n  - Selecting
            `0` will disable the check.\n"
          default: 0
          selector:
            number:
              min: 1.0
              max: 31.0
              step: 1.0
              mode: slider
        schedule_monthday_last:
          name: Latest day in the month to run the update process
          description: "Specify the latest day in month, on which this update can
            run.\nNote:\n  - Selecting `0` or a date lower than the \"Earliest Day\"
            will disable the check.\n"
          default: 0
          selector:
            number:
              min: 0.0
              max: 31.0
              step: 1.0
              mode: slider
        update_out_of_schedule:
          name: Out of schedule entities
          description: "`Optional`\n\nYou can select update entities which will be
            updated as soon an update is detected,\neven if outside the schedule windows.\n\nNotes:\n
            \ - Pause entities will be respected and prevent the update of the out
            of schedule entities.\n  - The out of schedule update can trigger a restart
            at an unexpected time outside the normal schedule.\n    Please use it
            with caution.\n"
          default: []
          selector:
            entity:
              multiple: true
              domain:
              - update
              reorder: false
        pause_entities:
          name: Pause update entities
          description: '`Optional`


            You can select one or more entities to pause the updates.

            If any of the selected entities is "On" or "True" the system won''t be
            updated on the schedule time.


            You can use this to hold your updates when you have a party at home,

            or when you are on vacations and don''t want to be concerned about updates
            on Home Assistant.

            '
          default: []
          selector:
            entity:
              multiple: true
              domain:
              - input_boolean
              - binary_sensor
              - switch
              reorder: false
    what_section:
      name: What (optional)
      icon: mdi:update
      description: Select what should be updated and what shouldn't be updated.
      collapsed: true
      input:
        core_os_update_mode:
          name: Update mode for Home Assistant core and OS updates
          description: "Please select the update mode for Home Assistant core and
            Home Assistan OS updates.\n* All: All updates will be installed.\n* Patches
            only:\n  ✅ From 2022.11.0 to 2022.11.3 will be updated (patches).\n  ❌
            From 2022.11.x to 2022.12.x will be ignored (minor update).\n  ❌ From
            2022.12.x to 2023.1.x will be ignored (major update).\n* Don't update:
            Ignore any update.\n"
          default: all
          selector:
            select:
              multiple: false
              options:
              - label: All
                value: all
              - label: Patches only
                value: patches
              - label: Don't update
                value: ignore
              sort: false
              custom_value: false
        firmware_update_mode:
          name: Update mode for device's firmware
          description: "Please select the update mode for firmware in the devices
            connected to Home Assistant (when supported as an HA update).\n* All:
            All updates will be installed.\n* Patches only:\n  ✅ From 2022.11.0 to
            2022.11.3 will be updated (patches).\n  ❌ From 2022.11.x to 2022.12.x
            will be ignored (minor update).\n  ❌ From 2022.12.x to 2023.1.x will be
            ignored (major update).\n* Don't update: Ignore any update.\n"
          default: all
          selector:
            select:
              multiple: false
              options:
              - label: All
                value: all
              - label: Patches only
                value: patches
              - label: Don't update
                value: ignore
              sort: false
              custom_value: false
        general_update_mode:
          name: Update mode for general updates
          description: "Please select the update mode for everything that is not a
            device's firmware or a core component of Home Assistant.\nThis includes
            add-ons, HACS componentes, custom cards, etc.\n* All: All updates will
            be installed.\n* Patches only:\n  ✅ From 2022.11.0 to 2022.11.3 will be
            updated (patches).\n  ❌ From 2022.11.x to 2022.12.x will be ignored (minor
            update).\n  ❌ From 2022.12.x to 2023.1.x will be ignored (major update).\n*
            Don't update: Ignore any update.\n"
          default: all
          selector:
            select:
              multiple: false
              options:
              - label: All
                value: all
              - label: Patches only
                value: patches
              - label: Don't update
                value: ignore
              sort: false
              custom_value: false
        update_inclusion_mode:
          name: Entity Inclusion Mode
          description: "Please select the entity inclusion mode. * All:\n  Just build
            the update entity list from all available update.* entities, which are
            in state 'on'.\n* Specified/Specified-Single:\n  Build the update entity
            list from the specified entity list, filtering for entities in 'on' state.\n
            \ - Specified: Updates all matching entities\n  - Specified-Single: Updates
            only the first matching entity\n* Searchfilter:\n  This works as a wildcard
            filter.\n  Examples:\n    'update.zigbee2mqtt_'   => all update entities
            from zigbee2mqtt addon\n    'update.esphome_'       => all update entities
            from esphome devices if their names start with 'esphome_'\n* Searchfilter-Single:\n
            \ Just like the searchfilter, but only the first entity. (Sorted alphabetically)"
          default: all
          selector:
            select:
              multiple: false
              options:
              - label: All
                value: all
              - label: Specified
                value: specified
              - label: Specified-Single
                value: specified-single
              - label: Searchfilter
                value: searchfilter
              - label: Searchfilter-Single
                value: searchfilter-single
              sort: false
              custom_value: false
        update_inclusion_entity_list:
          name: Entity Inclusion List
          description: '=> Important: This entity list will only be used when the
            Update Inclusion mode is set to "Specified" or "Specified-Single". Select
            the items which should be updated.'
          default: []
          selector:
            entity:
              multiple: true
              domain:
              - update
              reorder: false
        update_inclusion_entity_searchfilter:
          name: Entity Inclusion Searchfilter
          description: '=> Important: This searchfilter will only be used when the
            Update Inclusion mode is set to "Searchfilter" or "Searchfilter-Single".
            This defines the Searchfilter for finding the right update entities. This
            enables wildcard-like searching for a group of entities, aka "all zigbee
            entities" or "everything from Sonoff" etc.'
          default: ''
          selector:
            text:
              multiline: false
              multiple: false
        update_exclusions:
          name: Exclusions
          description: '`Optional`


            Select the items that should NOT be included on the automated updates.


            => Use this if you want to keep some add-on on an specific version and
            avoid auto-updates to it.

            '
          default: []
          selector:
            entity:
              multiple: true
              domain:
              - update
              reorder: false
    backup_section:
      name: Backup (optional)
      icon: mdi:backup-restore
      description: Select the back-up options
      collapsed: true
      input:
        run_during_backup:
          name: Backup state sensor
          description: '`Optional`


            Is a sensor is selected, this automation will run only when that sensor
            reports backup state as `idle`.

            No update will be executed while the backup state sensor is in any other
            state or "unavailable".


            If no sensor is selected, this automation won''t pause due to a backup
            in progress.

            '
          default: []
          selector:
            entity:
              multiple: false
              filter:
              - domain:
                - sensor
                device_class:
                - enum
                integration: backup
              reorder: false
        backup_bool:
          name: Create a full backup before start the updates?
          default: true
          selector:
            boolean: {}
        last_backup_timestamp_entity:
          name: Last successful automatic backup sensor
          description: '`Optional`

            '
          default: []
          selector:
            entity:
              multiple: false
              filter:
              - domain:
                - sensor
                device_class:
                - timestamp
                integration: backup
              reorder: false
        backup_timeout:
          name: Backup Timeout
          description: Specify how much time the automation waits for the backup process.
            We can't check whether the backup was successful. Per default we wait
            1 hour to finish the backup.
          default: 60
          selector:
            number:
              mode: box
              min: 1.0
              max: 180.0
              unit_of_measurement: minutes
              step: 1.0
        max_backup_age:
          name: Maximum backup age (or zero, to disable)
          description: '`Optional`


            This requires the [Google Drive Backup](https://github.com/sabeechen/hassio-google-drive-backup)

            addon to be installed and configured to automatically backup, and provide

            a sensor with the backup states. The setting only checks for the age of

            the automatic backups from that addon, not the backups created internally

            by this blueprint.

            '
          default:
            days: 0
            hours: 0
            minutes: 0
            seconds: 0
          selector:
            duration:
              enable_day: true
        backup_location:
          name: Backup Location
          description: 'You can create a new backup location under [Settings > System
            > Storage](https://my.home-assistant.io/redirect/storage/).


            Specify where to store the backup for this autoupdate process.

            '
          default: /backup
          selector:
            backup_location: {}
    actions_section:
      name: Actions (optional)
      icon: mdi:shoe-print
      description: Select actions to run at diferent moments on the update process
      collapsed: true
      input:
        actions_pre_update:
          name: Pre-update actions
          description: "`Optional`\n\nActions to execute before the backup or any
            update starts.\n\nYou can use this to send notifications, turn on/off
            devices or activate scenes before starting the updates.\n\n\nNote => Please
            be aware that all actions will run right before the update process,\nwhich
            can happens over-night. Take this in account when selecting your actions.\n\nNote
            => Some usefull variables available for your actions:\n  - \"`\\{\\{ updates_list
            \\}\\}`\" - contains the list of updates when the automation started.\n
            \ - \"`\\{\\{ updates_pending \\}\\}`\" - contains the list of updates
            remaining to be updated.\n"
          default: []
          selector:
            action: {}
        actions_pre_restart:
          name: Pre-restart actions
          description: "`Optional`\n\nActions to execute before the automation requests
            a restart.\n\nYou can use this to send notifications,\nturn on/off devices
            or stopping automations before restarting Home Assistant.\n\n\nNote =>
            Please be aware that all actions will run right before the restart process,\nwhich
            can happens over-night. Take this in account when selecting your actions.\n\nNote
            => Note all the restarts will be controlled by this automation,\nlike
            when a Core update is installed. These actions might not be executed in
            those cases.\n\nNote => Some usefull variables available for your actions:\n
            \ - \"`\\{\\{ updates_list \\}\\}`\" - contains the list of updates when
            the automation started.\n  - \"`\\{\\{ updates_pending \\}\\}`\" - contains
            the list of updates remaining to be updated.\n"
          default: []
          selector:
            action: {}
        actions_pos_update:
          name: Post-update actions
          description: "`Optional`\n\nActions to execute AFTER the update process
            finishes.\n\nYou can use this to send notifications, turn on/off devices
            or activate scenes after applying  the updates.\n\n\nNote => Please be
            aware that all actions will run right after the update process,\nwhich
            can happens over-night.\nTake this in account when selecting your actions.\n\nNote
            => Some usefull variables available for your actions:\n  - \"`\\{\\{ updates_list
            \\}\\}`\" - contains the list of updates when the automation started.\n
            \ - \"`\\{\\{ updates_pending \\}\\}`\" - contains the list of updates
            remaining to be updated.\n\n**IMPORTANT** => Some updates will automatically
            restart Home Assistant,\ncausing the automation to interrupt before finishing,
            preventing the pos-updates actions to be executed.\nIf you have critical
            actions to run after an update,\nconsider including also in another automation
            based on Home Assistant start.\n"
          default: []
          selector:
            action: {}
    notification_section:
      name: Notifications (optional)
      icon: mdi:bell
      description: Here you can setup optional notifications. Select a notify entity
        to enable notifications.
      collapsed: true
      input:
        notification_entity:
          name: Notify entity
          description: 'Select a notify entity to send messages to.

            This can be a Telegram notify entity, mobile app, or any other notify
            entity.

            Note: For Telegram entities, special characters will be automatically
            escaped.

            Leave empty to disable notifications.

            '
          default: []
          selector:
            entity:
              multiple: false
              domain:
              - notify
              reorder: false
        notification_message_title:
          name: Notification title
          description: '`Optional`


            Please select a title to be used on each notification message.


            You can type a custom text.

            '
          default:
          - friendly_name
          selector:
            select:
              custom_value: true
              multiple: false
              options:
              - label: Automation's friendly name
                value: friendly_name
              - label: Automation's entity Id
                value: entity_id
              - label: Blank (no title)
                value: blank
              sort: false
        notification_select_notifications:
          name: Select what to notify
          description: 'Select which steps should trigger notifications.

            '
          default:
          - starting
          - list_of_updates
          - pre_update_actions
          - backup
          - update_progress
          - remaining_updates
          - restart
          - post_update_actions
          - done
          selector:
            select:
              multiple: true
              options:
              - label: (Re-)Starting message
                value: starting
              - label: List of updates
                value: list_of_updates
              - label: Pre-update actions
                value: pre_update_actions
              - label: Backup
                value: backup
              - label: Update progress
                value: update_progress
              - label: Remaining updates
                value: remaining_updates
              - label: Restart
                value: restart
              - label: Post-update actions
                value: post_update_actions
              - label: Done message
                value: done
              sort: false
              custom_value: false
    general_settings:
      name: General settings (optional)
      icon: mdi:cog
      description: Select additional settings to the update process
      collapsed: true
      input:
        restart_type:
          name: Force Home Assistant to restart if required by any update?
          description: 'This won''t affect updates where a restart is automatic, but
            for updates requiring a manual restart (quite common on HACS) this blueprint
            can automatically force a restart by the end of the updates.

            '
          default: no-restart
          selector:
            select:
              multiple: false
              options:
              - label: Don't force a restart
                value: no-restart
              - label: Restart Home Assistant core
                value: core
              - label: Restart Home Assistant host
                value: host
              sort: false
              custom_value: false
        verbose_logging_bool:
          name: Log addon progress with verbosity to the logbook?
          description: '`Optional`


            When enabled, this automation will register each step on the logbook.


            This can be usefull for troubleshooting, but at normal conditions, it
            won''t add much value.

            '
          default: false
          selector:
            boolean: {}
        update_process_started_entity:
          name: '"Update Process Started" Toggle Entity'
          description: '`Optional`


            You can create a [Toggle Helper](https://www.home-assistant.io/integrations/input_boolean)
            under

            [Settings > Devices & Services > Helpers](https://my.home-assistant.io/redirect/config_flow_start/?domain=input_boolean).


            This entity will be used to determine if we still have to do a backup

            on automation start - so it is for inner workings of this automation.


            This saves you from getting multiple backups in the same update window.

            '
          default: []
          selector:
            entity:
              multiple: false
              domain:
              - input_boolean
              reorder: false
        update_timeout:
          name: Update Timeout
          description: 'Maximum time to wait for each update to complete.


            This protects the automation of waiting forever for an update that fails.


            Usually updates don''t take that very long,

            so feel free to ajust this time to something that fits better your environment.


            The default is 1200 seconds (20 minutes).

            You can select any value between 10 seconds and 7200 seconds (2 hours).


            If an update times out:

            - The automation will log an error message

            - The automation will continue with the next update

            - The timed-out update may still complete in the background

            '
          default: 1200
          selector:
            number:
              min: 10.0
              max: 7200.0
              step: 10.0
              unit_of_measurement: seconds
              mode: box
mode: single
max_exceeded: warning
trigger_variables:
  input_pause_entities: !input pause_entities
  input_update_exclusions: !input update_exclusions
  schedule_monthday_earliest: !input schedule_monthday_earliest
  schedule_monthday_last: !input schedule_monthday_last
  input_schedule_monthday_earliest: '{{ schedule_monthday_earliest | int(0) }}'
  input_schedule_monthday_last: '{{ schedule_monthday_last | int(0) }}'
  input_update_inclusion_entity_list: !input update_inclusion_entity_list
  input_update_inclusion_entity_searchfilter: !input update_inclusion_entity_searchfilter
  input_update_process_started_entity: !input update_process_started_entity
  update_out_of_schedule: !input update_out_of_schedule
trigger:
- id: HA Schedule based
  platform: state
  entity_id: !input schedule_entity
- id: HA Start
  platform: homeassistant
  event: start
- id: New update
  platform: template
  value_template: "{{\n  states.update\n  | default([])\n  | selectattr(\"state\",
    \"eq\", \"on\")\n  | rejectattr(\"entity_id\", \"in\", input_update_exclusions)\n
    \ | rejectattr(\"entity_id\", \"in\", update_out_of_schedule)\n  | list | count
    | int(0) > 0\n}}"
- id: New day
  platform: template
  value_template: "{{\n  (now().day >= input_schedule_monthday_earliest or input_schedule_monthday_earliest
    == 0) and\n  (\n    now().day <= input_schedule_monthday_last or\n    input_schedule_monthday_last
    == 0 or\n    input_schedule_monthday_last < input_schedule_monthday_earliest\n
    \ )\n}}\n"
- id: Automations reloaded
  platform: event
  event_type: automation_reloaded
- id: Pause entities changed
  platform: state
  entity_id: !input pause_entities
- id: Out of schedule
  platform: state
  entity_id: !input update_out_of_schedule
  from: 'off'
  to: 'on'
condition:
- condition: or
  conditions:
  - condition: trigger
    id: Out of schedule
  - condition: and
    conditions:
    - condition: or
      conditions:
      - condition: trigger
        id: HA Start
      - condition: trigger
        id: Automations reloaded
    - condition: template
      value_template: "{{\n  states.update\n  | default([])\n  | selectattr(\"state\",
        \"eq\", \"on\")\n  | selectattr(\"entity_id\", \"in\", update_out_of_schedule)\n
        \ | rejectattr(\"entity_id\", \"in\", input_update_exclusions)\n  | list |
        count | int(0) > 0\n}}"
  - condition: and
    conditions:
    - condition: state
      entity_id: !input schedule_entity
      state: 'on'
    - condition: template
      value_template: "{{\n  states.update\n  | default([])\n  | selectattr(\"state\",
        \"eq\", \"on\")\n  | rejectattr(\"entity_id\", \"in\", input_update_exclusions)\n
        \ | list | count | int(0) > 0\n}}"
  - condition: and
    conditions:
    - condition: trigger
      id: HA Start
    - '{{ input_update_process_started_entity | default([]) | count == 1 }}'
    - condition: state
      entity_id: !input update_process_started_entity
      state: 'on'
- condition: or
  conditions:
  - condition: trigger
    id: Out of schedule
  - condition: template
    value_template: "{{\n  (now().day >= input_schedule_monthday_earliest or input_schedule_monthday_earliest
      == 0) and\n  (now().day <= input_schedule_monthday_last or input_schedule_monthday_last
      == 0)\n}}\n"
- condition: or
  conditions:
  - '{{ input_pause_entities | default([]) | list | count | int(0) < 1 }}'
  - condition: state
    entity_id: !input pause_entities
    state: 'off'
variables:
  temp_input_update_exclusions: !input update_exclusions
  input_verbose_logging_bool: !input verbose_logging_bool
  input_core_os_update_mode: !input core_os_update_mode
  input_firmware_update_mode: !input firmware_update_mode
  input_general_update_mode: !input general_update_mode
  input_update_inclusion_mode: !input update_inclusion_mode
  input_notification_entity: !input notification_entity
  input_notification_select_notifications: !input notification_select_notifications
  input_notification_message_title: !input notification_message_title
  core_update_entity: "{% for u in integration_entities('hassio') | select('search',
    '^update[.]')\n  if (device_attr(u, 'identifiers') | first | default(\"\"))[1]
    == 'core' %}\n    {{ u }}\n{% endfor %}\n"
  os_update_entity: "{% for u in integration_entities('hassio') | select('search',
    '^update[.]')\n  if (device_attr(u, 'identifiers') | first | default(\"\"))[1]
    == 'OS' %}\n    {{ u }}\n{% endfor %}\n"
  supervisor_update_entity: "{% for u in integration_entities('hassio') | select('search',
    '^update[.]')\n  if (device_attr(u, 'identifiers') | first | default(\"\"))[1]
    == 'supervisor' %}\n    {{ u }}\n{% endfor %}\n"
  is_resume_after_restart: "{{\n  input_update_process_started_entity | default([])
    | count == 1 and\n  is_state(input_update_process_started_entity | first | default(\"\"),
    \"on\")\n}}\n"
  is_out_of_schedule_mode: "{{\n  trigger.id == \"Out of schedule\" or\n  (\n    (trigger.id
    == \"HA Start\" or trigger.id == \"Automations reloaded\") and\n    (\n      states.update\n
    \     | default([])\n      | selectattr(\"state\", \"eq\", \"on\")\n      | selectattr(\"entity_id\",
    \"in\", update_out_of_schedule)\n      | rejectattr(\"entity_id\", \"in\", input_update_exclusions)\n
    \     | list | count | int(0) > 0\n    )\n  )\n}}\n"
  friendly_name: "{% set friendly_name_tmp = state_attr(this.entity_id, \"friendly_name\")
    | default(\"\") %}\n{{\n  friendly_name_tmp\n  if friendly_name_tmp is string
    and friendly_name_tmp | length > 0\n  else \"Auto-update\"\n}}\n"
  is_telegram_notify: "{{\n  input_notification_entity is string and\n  input_notification_entity
    | length > 0 and\n  'telegram' in input_notification_entity.lower()\n}}\n"
  notification_title: "{% if (input_notification_message_title == \"friendly_name\")
    %}\n  {{ friendly_name }}\n{% elif (input_notification_message_title == \"entity_id\")
    %}\n  {{ this.entity_id }}\n{% elif (input_notification_message_title != \"blank\"
    and\n          input_notification_message_title is string and\n          input_notification_message_title
    | length > 0) %}\n  {{ input_notification_message_title }}\n{% else %}\n  {{ \"\"
    }}\n{% endif %}\n"
action:
- alias: Refresh update entities
  action: homeassistant.update_entity
  data:
    entity_id: "{{\n  states.update\n  | default([])\n  | rejectattr('entity_id',
      'in', input_update_exclusions)\n  | map(attribute='entity_id')\n  | list\n}}\n"
  continue_on_error: true
- &id003
  variables:
    firmware_update_entities: "{% if is_out_of_schedule_mode %}\n  {# For out-of-schedule
      triggers, return empty list #}\n  {# The update_out_of_schedule list will be
      added to combined_list directly #}\n  []\n{% else %}\n  {{\n    states.update\n
      \   | default([])\n    | selectattr(\"state\", \"eq\", \"on\")\n    | selectattr('attributes.device_class',
      'defined')\n    | selectattr('attributes.device_class', 'eq', 'firmware')\n
      \   | rejectattr('entity_id', 'in', input_update_exclusions)\n    | map(attribute='entity_id')\n
      \   | list\n  }}\n{% endif %}\n"
    general_update_entities: "{% if is_out_of_schedule_mode %}\n  {# For out-of-schedule
      triggers, return empty list #}\n  {# The update_out_of_schedule list will be
      added to combined_list directly #}\n  []\n{% elif input_update_inclusion_mode
      == \"all\" %}\n  {{\n    states.update\n    | default([])\n    | selectattr('state',
      'eq', 'on')\n    | rejectattr('entity_id', 'in', core_update_entity)\n    |
      rejectattr('entity_id', 'in', os_update_entity)\n    | rejectattr('entity_id',
      'in', supervisor_update_entity)\n    | rejectattr('entity_id', 'in', firmware_update_entities)\n
      \   | rejectattr('entity_id', 'in', input_update_exclusions)\n    | map(attribute='entity_id')\n
      \   | list\n  }}\n{% elif input_update_inclusion_mode == \"specified\" %}\n
      \ {{\n    states.update\n    | default([])\n    | selectattr('state', 'eq',
      'on')\n    | selectattr('entity_id', 'in', input_update_inclusion_entity_list)\n
      \   | rejectattr('entity_id', 'in', core_update_entity)\n    | rejectattr('entity_id',
      'in', os_update_entity)\n    | rejectattr('entity_id', 'in', supervisor_update_entity)\n
      \   | rejectattr('entity_id', 'in', firmware_update_entities)\n    | rejectattr('entity_id',
      'in', input_update_exclusions)\n    | map(attribute='entity_id')\n    | list\n
      \ }}\n{% elif input_update_inclusion_mode == \"specified-single\" %}\n  {{\n
      \   states.update\n    | default([])\n    | selectattr('state', 'eq', 'on')\n
      \   | selectattr('entity_id', 'in', input_update_inclusion_entity_list)\n    |
      rejectattr('entity_id', 'in', core_update_entity)\n    | rejectattr('entity_id',
      'in', os_update_entity)\n    | rejectattr('entity_id', 'in', supervisor_update_entity)\n
      \   | rejectattr('entity_id', 'in', firmware_update_entities)\n    | rejectattr('entity_id',
      'in', input_update_exclusions)\n    | map(attribute='entity_id')\n    | list\n
      \   | first\n    | default(\"\")\n  }}\n{% elif input_update_inclusion_mode
      == \"searchfilter\" %}\n  {{\n    states.update\n    | default([])\n    | selectattr('state',
      'eq', 'on')\n    | selectattr('entity_id', 'match', input_update_inclusion_entity_searchfilter)\n
      \   | rejectattr('entity_id', 'in', core_update_entity)\n    | rejectattr('entity_id',
      'in', os_update_entity)\n    | rejectattr('entity_id', 'in', supervisor_update_entity)\n
      \   | rejectattr('entity_id', 'in', firmware_update_entities)\n    | rejectattr('entity_id',
      'in', input_update_exclusions)\n    | map(attribute='entity_id')\n    | list\n
      \ }}\n{% elif input_update_inclusion_mode == \"searchfilter-single\" %}\n  {{\n
      \   states.update\n    | default([])\n    | selectattr('state', 'eq', 'on')\n
      \   | selectattr('entity_id', 'match', input_update_inclusion_entity_searchfilter)\n
      \   | rejectattr('entity_id', 'in', core_update_entity)\n    | rejectattr('entity_id',
      'in', os_update_entity)\n    | rejectattr('entity_id', 'in', supervisor_update_entity)\n
      \   | rejectattr('entity_id', 'in', firmware_update_entities)\n    | rejectattr('entity_id',
      'in', input_update_exclusions)\n    | map(attribute='entity_id')\n    | list\n
      \   | first\n    | default(\"\")\n  }}\n{% endif %}\n"
    input_update_exclusions: "{% set exclusions = temp_input_update_exclusions | default([])
      %}\n{% if input_core_os_update_mode == 'ignore' %}\n  {% set exclusions = exclusions
      + [core_update_entity | default(\"\"), os_update_entity | default(\"\")] %}\n{%
      else %}\n  {% set core_installed_version = states.update\n                                  |
      default([])\n                                  | selectattr('entity_id', 'in',
      core_update_entity | default(\"\"))\n                                  | map(attribute='attributes.installed_version')\n
      \                                 | list\n                                  |
      first\n                                  | default('') %}\n  {% set core_latest_version
      = states.update\n                                | default([])\n                                |
      selectattr('entity_id', 'in', core_update_entity | default(\"\"))\n                                |
      map(attribute='attributes.latest_version')\n                                |
      list\n                                | first\n                                |
      default('') %}\n  {% set core_version_change = version(core_latest_version)
      - version(core_installed_version) %}\n  {% set os_installed_version = states.update\n
      \                               | default([])\n                                |
      selectattr('entity_id', 'in', os_update_entity | default(\"\"))\n                                |
      map(attribute='attributes.installed_version')\n                                |
      list\n                                | first\n                                |
      default('') %}\n  {% set os_latest_version = states.update\n                              |
      default([])\n                              | selectattr('entity_id', 'in', os_update_entity
      | default(\"\"))\n                              | map(attribute='attributes.latest_version')\n
      \                             | list\n                              | first\n
      \                             | default('') %}\n  {% set os_version_change =
      version(os_latest_version) - version(os_installed_version) %}\n\n  {% if input_core_os_update_mode
      == 'patches' %}\n    {% if core_version_change.major or\n          core_version_change.minor
      or\n          (not core_version_change.patch) %}\n      {% set exclusions =
      exclusions + [core_update_entity | default(\"\")] %}\n    {% endif %}\n    {%
      if os_version_change.major or\n          os_version_change.minor or\n          (not
      os_version_change.patch) %}\n      {% set exclusions = exclusions + [os_update_entity
      | default(\"\")] %}\n    {% endif %}\n  {% elif input_core_os_update_mode ==
      'major_and_minor' %}\n    {% if (not core_version_change.major) and (not core_version_change.minor)
      %}\n      {% set exclusions = exclusions + [core_update_entity | default(\"\")]
      %}\n    {% endif %}\n    {% if (not os_version_change.major) and (not os_version_change.minor)
      %}\n      {% set exclusions = exclusions + [os_update_entity | default(\"\")]
      %}\n    {% endif %}\n  {% endif %}\n{% endif %}\n{% if input_firmware_update_mode
      == 'ignore' %}\n  {% set exclusions = exclusions + [ firmware_update_entities
      ] %}\n{% else %}\n  {% set ns = namespace(entities = []) %}\n  {% for entity
      in expand(firmware_update_entities)\n                    | rejectattr('entity_id',
      'in', exclusions)\n                    | selectattr('state', 'eq', 'on') %}\n
      \   {% set entity_version_change = version(entity.attributes.latest_version
      | default(''))\n                                    - version(entity.attributes.installed_version
      | default('')) %}\n    {% if input_firmware_update_mode == 'patches' %}\n      {%
      if entity_version_change.major or\n            entity_version_change.minor or\n
      \           (not entity_version_change.patch) %}\n        {% set ns.entities
      = ns.entities + [ entity.entity_id ] %}\n      {% endif %}\n    {% elif input_firmware_update_mode
      == 'major_and_minor' %}\n      {% if (not entity_version_change.major) and (not
      entity_version_change.minor) %}\n        {% set ns.entities = ns.entities +
      [ entity.entity_id ] %}\n      {% endif %}\n    {% endif %}\n  {% endfor %}\n
      \ {% set exclusions = exclusions + [ ns.entities ] %}\n{% endif %}\n{% if input_general_update_mode
      == 'ignore' %}\n  {% set exclusions = exclusions + [ general_update_entities
      ] %}\n{% else %}\n  {% set ns = namespace(entities = []) %}\n  {% for entity
      in expand(general_update_entities)\n                    | rejectattr('entity_id',
      'in', exclusions)\n                    | selectattr('state', 'eq', 'on') %}\n
      \   {% set entity_version_change = version(entity.attributes.latest_version
      | default(''))\n                                  - version(entity.attributes.installed_version
      | default('')) %}\n    {% if input_general_update_mode == 'patches' %}\n      {%
      if entity_version_change.major or\n            entity_version_change.minor or\n
      \           (not entity_version_change.patch) %}\n        {% set ns.entities
      = ns.entities + [ entity.entity_id ] %}\n      {% endif %}\n    {% elif input_general_update_mode
      == 'major_and_minor' %}\n      {% if (not entity_version_change.major) and (not
      entity_version_change.minor) %}\n        {% set ns.entities = ns.entities +
      [ entity.entity_id ] %}\n      {% endif %}\n    {% endif %}\n  {% endfor %}\n
      \ {% set exclusions = exclusions + [ ns.entities ] %}\n{% endif %}\n{{ exclusions
      }}\n"
    combined_list: "{% set entities = namespace(list=[]) %} {%- if is_out_of_schedule_mode
      %}\n  {# In out-of-schedule mode: ONLY include entities from update_out_of_schedule
      list #}\n  {%- for entity in [update_out_of_schedule] %}\n    {%- if entity
      is sequence and entity is not string %}\n      {%- for item in entity %}\n        {%-
      if item is string %}\n          {%- set entities.list = entities.list + [item]
      %}\n        {%- endif %}\n      {%- endfor %}\n    {%- elif entity is string
      %}\n      {%- set entities.list = entities.list + [entity] %}\n    {%- endif
      %}\n  {%- endfor %}\n{%- else %}\n  {# Normal mode: Include all entity types
      #}\n  {%- for entity in [firmware_update_entities, general_update_entities,\n
      \                   core_update_entity, os_update_entity, supervisor_update_entity]
      %}\n    {%- if entity is sequence and entity is not string %}\n      {%- for
      item in entity %}\n        {%- if item is string %}\n          {%- set entities.list
      = entities.list + [item] %}\n        {%- endif %}\n      {%- endfor %}\n    {%-
      elif entity is string %}\n      {%- set entities.list = entities.list + [entity]
      %}\n    {%- endif %}\n  {%- endfor %}\n{%- endif %} {{ entities.list }}"
    updates_pending: "{% set updates = namespace(list=[]) %} {%- for entity in states.update
      %}\n  {%- if (entity.state == \"on\" and\n          entity.entity_id in combined_list
      and\n          entity.entity_id not in input_update_exclusions) %}\n    {%-
      set updates.list = updates.list + [entity.entity_id] %}\n  {%- endif %}\n{%-
      endfor %} {{ updates.list }}"
    pending_update_list: '{{ updates_pending }}'
    updates_pending_count: '{{ updates_pending | list | count | int(0) }}'
- variables:
    update_list: '{{ updates_pending }}'
    updates_list: '{{ updates_pending }}'
    is_there_anything_to_update: '{{ updates_pending_count > 0 }}'
- alias: Preparation
  sequence:
  - variables:
      log_message: '{{ friendly_name }} is {{ "re" if is_resume_after_restart else
        ""}}starting'
  - &id001
    if: '{{ input_verbose_logging_bool }}'
    then:
    - alias: Logbook - Update
      action: logbook.log
      data:
        name: Auto-update
        entity_id: '{{ this.entity_id }}'
        message: '{{ log_message }}'
      continue_on_error: true
    continue_on_error: true
  - if: '{{ "starting" in input_notification_select_notifications }}'
    then:
    - &id002
      sequence:
      - variables:
          notification_message: "{%- if is_telegram_notify -%}\n  {{ log_message\n
            \   | replace('\\\\', '\\\\\\\\')\n    | replace('_', '\\\\_')\n    |
            replace('*', '\\\\*')\n    | replace('[', '\\\\[')\n    | replace(']',
            '\\\\]')\n    | replace('(', '\\\\(')\n    | replace(')', '\\\\)')\n    |
            replace('~', '\\\\~')\n    | replace('`', '\\\\`')\n    | replace('>',
            '\\\\>')\n    | replace('#', '\\\\#')\n    | replace('+', '\\\\+')\n    |
            replace('-', '\\\\-')\n    | replace('=', '\\\\=')\n    | replace('|',
            '\\\\|')\n    | replace('{', '\\\\{')\n    | replace('}', '\\\\}')\n    |
            replace('.', '\\\\.')\n    | replace('!', '\\\\!')\n  }}\n{%- else -%}\n
            \ {{ log_message }}\n{%- endif -%}"
      - if:
        - condition: template
          value_template: '{{ input_notification_entity | length > 0 }}'
          alias: Check if notification entity is configured
        then:
        - alias: Notify - Send message
          action: notify.send_message
          target:
            entity_id: '{{ input_notification_entity }}'
          data:
            title: '{{ notification_title }}'
            message: '{{ notification_message }}'
          continue_on_error: true
- alias: Report list of updates
  if:
  - '{{ is_there_anything_to_update }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - variables:
      log_message: "List of updates:\n- {{ states.update\n    | selectattr('state',
        'eq', 'on')\n    | rejectattr('entity_id', 'in', input_update_exclusions)\n
        \   | map(attribute='name') | list | join(\"\\n- \") }}\n"
  - *id001
  - if: '{{ "list_of_updates" in input_notification_select_notifications }}'
    then:
    - *id002
  else:
  - variables:
      log_message: There's nothing to update
  - *id001
  - if: '{{ "list_of_updates" in input_notification_select_notifications }}'
    then:
    - *id002
- alias: Set ON helper flag
  if:
  - '{{ input_update_process_started_entity | default([]) | count > 0 }}'
  - '{{ input_update_process_started_entity[0] | string | length > 0 }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - action: input_boolean.turn_on
    target:
      entity_id: !input update_process_started_entity
    continue_on_error: true
- alias: Pre-update actions
  if:
  - '{{ is_there_anything_to_update }}'
  - '{{ not is_resume_after_restart }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - variables:
      input_actions_pre_update: !input actions_pre_update
  - condition: '{{ input_actions_pre_update is sequence }}'
  - *id003
  - variables:
      log_message: Running pre-update actions...
  - *id001
  - if: '{{ "pre_update_actions" in input_notification_select_notifications }}'
    then:
    - *id002
  - alias: Run pre-update actions
    continue_on_error: true
    sequence: !input actions_pre_update
  - variables:
      log_message: Pre-update actions completed
  - *id001
  - if: '{{ "pre_update_actions" in input_notification_select_notifications }}'
    then:
    - *id002
- alias: Backup
  if:
  - '{{ is_there_anything_to_update }}'
  - '{{ not is_resume_after_restart }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - *id003
  - variables:
      input_backup_bool: !input backup_bool
      input_backup_timeout_minutes: !input backup_timeout
      input_backup_timeout: '{{ input_backup_timeout_minutes | int(60) }}'
      temp_max_backup_age: !input max_backup_age
      input_max_backup_age_seconds: "{{\n  timedelta(\n    days=temp_max_backup_age.days,\n
        \   hours=temp_max_backup_age.hours,\n    minutes=temp_max_backup_age.minutes,\n
        \   seconds=temp_max_backup_age.seconds\n  ).total_seconds()\n}}\n"
  - alias: Check existing backups uploaded
    continue_on_error: true
    if:
    - '{{ not is_state("sensor.backup_state", "unknown") }}'
    - '{{ not is_state("sensor.backup_state", "unavailable") }}'
    - '{{ input_max_backup_age_seconds > 0 }}'
    then:
    - variables:
        last_backup_timestamp_list: "{{\n  states.sensor\n  | selectattr(\"attributes.last_backup\",
          \"defined\")\n  | map(attribute=\"attributes.last_backup\")\n  | list\n}}\n"
        last_backup_timestamp: '{{ last_backup_timestamp_list | max if last_backup_timestamp_list
          | count > 0 else None }}'
    - alias: Check if backup state is defined
      if: '{{ last_backup_timestamp != None }}'
      then:
      - alias: Check age of last uploaded backup
        if: '{{ as_timestamp(now()) - as_timestamp(last_backup_timestamp) > input_max_backup_age_seconds
          }}'
        then:
        - variables:
            log_message: Last uploaded backup is too old
        - *id001
        - if: '{{ "backup" in input_notification_select_notifications }}'
          then:
          - *id002
        - stop: Last uploaded backup is too old
      else:
      - variables:
          log_message: Backup State sensor not found
      - *id001
      - if: '{{ "backup" in input_notification_select_notifications }}'
        then:
        - *id002
      - stop: Backup State sensor not found
  - alias: Backup
    continue_on_error: true
    if:
    - '{{ input_backup_bool }}'
    - condition: state
      entity_id: !input update_process_started_entity
      state: 'off'
    then:
    - action: input_boolean.turn_on
      target:
        entity_id: '{{ input_update_process_started_entity }}'
      continue_on_error: true
    - variables:
        log_message: Backing up Home Assistant
    - *id001
    - if: '{{ "backup" in input_notification_select_notifications }}'
      then:
      - *id002
    - alias: Call backup service
      action: hassio.backup_full
      data:
        compressed: true
      continue_on_error: true
    - variables:
        log_message: 'Backup triggered

          Waiting {{ input_backup_timeout | int(60) }} minutes

          '
    - *id001
    - if: '{{ "backup" in input_notification_select_notifications }}'
      then:
      - *id002
    - alias: Wait for the backup
      delay:
        minutes: '{{ input_backup_timeout | int(60) }}'
    - variables:
        log_message: 'Backup Wait time finished.

          Continuing...

          '
    - *id001
    - if: '{{ "backup" in input_notification_select_notifications }}'
      then:
      - *id002
- alias: Update generic
  if:
  - '{{ is_there_anything_to_update }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - *id003
  - variables:
      log_message: Update generic items
  - *id001
  - variables:
      log_message: Starting sequence of standard updates...
  - *id001
  - if: '{{ "update_progress" in input_notification_select_notifications }}'
    then:
    - *id002
  - alias: Update - Generic
    continue_on_error: true
    repeat:
      while:
      - '{{ input_general_update_mode in [''patches'', ''major_and_minor'', ''all'']
        }}'
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ is_out_of_schedule_mode }}'
        - condition: state
          entity_id: !input schedule_entity
          state: 'on'
      - condition: template
        value_template: "{{ ( states.update\n  | selectattr('state', 'eq', 'on')\n
          \ | selectattr('entity_id', 'in', updates_pending)\n  | rejectattr('entity_id',
          'in', core_update_entity)\n  | rejectattr('entity_id', 'in', os_update_entity)\n
          \ | rejectattr('entity_id', 'in', firmware_update_entities)\n  | rejectattr('entity_id',
          'in', input_update_exclusions)\n  | map(attribute='entity_id')\n  | list
          | count | int(0) ) > 0\n}}\n"
      sequence:
      - variables:
          updates_pending: "{{ states.update\n  | selectattr('state', 'eq', 'on')\n
            \ | selectattr('entity_id', 'in', updates_pending)\n  | rejectattr('entity_id',
            'in', core_update_entity)\n  | rejectattr('entity_id', 'in', os_update_entity)\n
            \ | rejectattr('entity_id', 'in', firmware_update_entities)\n  | rejectattr('entity_id',
            'in', input_update_exclusions)\n  | map(attribute='entity_id')\n  | list\n}}\n"
      - &id004
        variables:
          current_update_entity: '{{ updates_pending[0] }}'
          current_update_entity_friendly_name: '{{ state_attr(current_update_entity,
            "friendly_name") | default(current_update_entity) }}

            '
      - &id005
        alias: Log updating
        sequence:
        - variables:
            log_message: Updating "{{ current_update_entity_friendly_name }}"...
        - *id001
        - if: '{{ "update_progress" in input_notification_select_notifications }}'
          then:
          - *id002
      - &id006
        alias: Update - Install
        continue_on_error: true
        action: update.install
        data: {}
        target:
          entity_id: '{{ current_update_entity }}'
      - &id007
        alias: Update - Wait
        sequence:
        - alias: Wait
          continue_on_error: true
          wait_template: '{{ is_state(current_update_entity, "off") }}'
          continue_on_timeout: true
          timeout: !input update_timeout
        - if: '{{ wait.completed }}'
          then:
          - variables:
              log_message: '"{{ current_update_entity_friendly_name }}" updated successfully'
          - *id001
          - if: '{{ "update_progress" in input_notification_select_notifications }}'
            then:
            - *id002
          else:
          - variables:
              log_message: 'ERROR: "{{ current_update_entity_friendly_name }}" update
                timed out'
          - *id001
          - if: '{{ "update_progress" in input_notification_select_notifications }}'
            then:
            - *id002
- alias: Devices firmware
  if:
  - '{{ is_there_anything_to_update }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - *id003
  - variables:
      log_message: Device's firmware
  - *id001
  - variables:
      log_message: Starting sequence of Devices firmware update
  - *id001
  - if: '{{ "update_progress" in input_notification_select_notifications }}'
    then:
    - *id002
  - alias: Update - Devices firmware
    continue_on_error: true
    repeat:
      while:
      - '{{ input_firmware_update_mode in [''patches'', ''major_and_minor'', ''all'']
        }}'
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ is_out_of_schedule_mode }}'
        - condition: state
          entity_id: !input schedule_entity
          state: 'on'
      - condition: template
        value_template: "{{ ( states.update\n  | selectattr('state', 'eq', 'on')\n
          \ | selectattr('entity_id', 'in', firmware_update_entities)\n  | rejectattr('entity_id',
          'in', input_update_exclusions)\n  | map(attribute='entity_id')\n  | list
          | count | int(0) ) > 0\n}}\n"
      sequence:
      - variables:
          updates_pending: "{{ states.update\n  | selectattr('state', 'eq', 'on')\n
            \ | selectattr('entity_id', 'in', firmware_update_entities)\n  | map(attribute='entity_id')\n
            \ | list\n}}\n"
      - *id004
      - *id005
      - *id006
      - *id007
- alias: Update core
  if:
  - '{{ is_there_anything_to_update }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - *id003
  - variables:
      log_message: Update Core
  - *id001
  - variables:
      log_message: Starting sequence of core items updates...
  - *id001
  - if: '{{ "update_progress" in input_notification_select_notifications }}'
    then:
    - *id002
  - alias: Update - Core
    continue_on_error: true
    repeat:
      while:
      - '{{ input_core_os_update_mode in [''patches'', ''major_and_minor'', ''all'']
        }}'
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ is_out_of_schedule_mode }}'
        - condition: state
          entity_id: !input schedule_entity
          state: 'on'
      - condition: template
        value_template: "{{ ( states.update\n  | selectattr('state', 'eq', 'on')\n
          \ | selectattr('entity_id', 'in', core_update_entity)\n  | rejectattr('entity_id',
          'in', input_update_exclusions)\n  | map(attribute='entity_id')\n  | list
          | count | int(0) ) > 0\n}}\n"
      sequence:
      - variables:
          updates_pending: "{{ states.update\n  | selectattr('state', 'eq', 'on')\n
            \ | selectattr('entity_id', 'in', core_update_entity)\n  | rejectattr('entity_id',
            'in', input_update_exclusions)\n  | map(attribute='entity_id')\n  | list\n}}\n"
      - *id004
      - *id005
      - *id006
      - *id007
- alias: Update OS
  if:
  - '{{ is_there_anything_to_update }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - *id003
  - variables:
      log_message: Update OS
  - *id001
  - variables:
      log_message: Starting sequence of OS update
  - *id001
  - if: '{{ "update_progress" in input_notification_select_notifications }}'
    then:
    - *id002
  - alias: Update - OS
    continue_on_error: true
    repeat:
      while:
      - '{{ input_core_os_update_mode in [''patches'', ''major_and_minor'', ''all'']
        }}'
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ is_out_of_schedule_mode }}'
        - condition: state
          entity_id: !input schedule_entity
          state: 'on'
      - condition: template
        value_template: "{{ ( states.update\n  | selectattr('state', 'eq', 'on')\n
          \ | selectattr('entity_id', 'in', os_update_entity)\n  | rejectattr('entity_id',
          'in', input_update_exclusions)\n  | map(attribute='entity_id')\n  | list
          | count | int(0) ) > 0\n}}\n"
      sequence:
      - variables:
          updates_pending: "{{ states.update\n  | selectattr('state', 'eq', 'on')\n
            \ | selectattr('entity_id', 'in', os_update_entity)\n  | rejectattr('entity_id',
            'in', input_update_exclusions)\n  | map(attribute='entity_id')\n  | list\n}}\n"
      - *id004
      - *id005
      - *id006
      - *id007
- alias: Update - Remaining
  continue_on_error: true
  if:
  - '{{ is_there_anything_to_update }}'
  - condition: state
    entity_id: !input schedule_entity
    state: 'on'
  then:
  - *id003
  - variables:
      log_message: Updating all remaining items (if any)
  - *id001
  - variables:
      remaining_items: '{{ states.update

        | selectattr(''state'', ''eq'', ''on'')

        | selectattr(''entity_id'', ''in'', updates_pending)

        | rejectattr(''entity_id'', ''in'', input_update_exclusions)

        | map(attribute=''entity_id'')

        | list

        }}

        '
      remaining_items_count: '{{ remaining_items | count if remaining_items is sequence
        else 0 }}'
  - condition: '{{ remaining_items_count > 0 }}'
  - variables:
      log_message: 'Remaining updates:

        - {{ remaining_items | join("\n- ") }}

        '
  - *id001
  - if: '{{ "update_progress" in input_notification_select_notifications }}'
    then:
    - *id002
  - alias: Update - Remaining - Install
    continue_on_error: true
    service: update.install
    data: {}
    target:
      entity_id: '{{ states.update | selectattr(''state'', ''eq'', ''on'') | selectattr(''entity_id'',
        ''in'', updates_pending) | rejectattr(''entity_id'', ''in'', input_update_exclusions)
        | map(attribute=''entity_id'') | list }}'
  - alias: Update - Remaining - Wait
    continue_on_error: true
    wait_template: "{{\n  (\n    states.update\n    | selectattr('state', 'eq', 'on')\n
      \   | selectattr('entity_id', 'in', updates_pending)\n    | rejectattr('entity_id',
      'in', input_update_exclusions)\n    | list\n    | count\n    | int(0)\n  ) <
      1\n}}"
    continue_on_timeout: true
    timeout: !input update_timeout
- alias: Finishing
  sequence:
  - *id003
  - variables:
      log_message: Finishing update process
  - *id001
  - if: '{{ "remaining_updates" in input_notification_select_notifications }}'
    then:
    - *id002
  - variables:
      remaining_updates: "{{\n  states.update\n  | selectattr('state', 'eq', 'on')\n
        \ | selectattr('entity_id', 'in', updates_pending)\n  | rejectattr('entity_id',
        'in', input_update_exclusions)\n  | map(attribute='name')\n  | list\n}}\n"
      remaining_updates_count: '{{ remaining_updates | count | int(0) }}'
  - if: '{{ remaining_updates_count > 0 }}'
    then:
    - variables:
        log_message: 'Remaining updates:

          - {{ remaining_updates | join("\n- ") }}

          '
    - *id001
    - if: '{{ "remaining_updates" in input_notification_select_notifications }}'
      then:
      - *id002
    else:
    - variables:
        log_message: No remaining items to be updated
    - *id001
- alias: Restart
  sequence:
  - variables:
      input_restart_type: !input restart_type
  - condition: '{{ input_restart_type != "no-restart" }}'
  - alias: Wait pending operations
    continue_on_error: true
    wait_template: "{{\n  (\n    states.update\n    | rejectattr('state', 'eq', 'off')\n
      \   | rejectattr('entity_id', 'in', input_update_exclusions)\n    | map(attribute='entity_id')\n
      \   | list | count | int(0)\n  ) < 1\n}}\n"
    continue_on_timeout: true
    timeout:
      seconds: 30
  - variables:
      pending_restart_items: "{{ states.update\n  | selectattr('attributes.release_summary',
        'defined')\n  | selectattr('attributes.release_summary', 'search', \"<ha-alert
        alert-type='error'>\")\n  | map(attribute='name')\n  | list\n}}\n"
      pending_restart_items_count: '{{ pending_restart_items | count | int(0) }}'
  - if: '{{ pending_restart_items_count < 1 }}'
    then:
    - variables:
        log_message: Nothing requiring a restart
    - *id001
  - condition: '{{ pending_restart_items_count > 0 }}'
  - variables:
      log_message: '{{ pending_restart_items_count }} item{{ "s" if pending_restart_items_count
        > 1 }} pending a restart:

        - {{ pending_restart_items | join("\n- ") }}

        '
  - *id001
  - if: '{{ "restart" in input_notification_select_notifications }}'
    then:
    - *id002
  - alias: Restart
    continue_on_error: true
    sequence:
    - condition: '{{ pending_restart_items_count > 0 }}'
    - alias: Restart - Check config
      continue_on_error: true
      action: homeassistant.check_config
    - variables:
        has_invalid_config: "{{\n  states.persistent_notification.invalid_config.state\n
          \ | default('unavailable') == 'notifying'\n}}\n"
        has_check_config_notification: "{{\n  states.persistent_notification.homeassistant_check_config.state\n
          \ | default('unavailable') == 'notifying'\n}}\n"
    - if: '{{ has_invalid_config or has_check_config_notification }}'
      then:
      - variables:
          log_message: Running pre-restart actions...
      - *id001
      - if: '{{ "restart" in input_notification_select_notifications }}'
        then:
        - *id002
      - alias: Run pre-restart actions
        continue_on_error: true
        sequence: !input actions_pre_restart
      - variables:
          log_message: "Skipping restart process due to notifications of invalid configurations:\n\n
            \ - has_invalid_config = {{ has_invalid_config }}\n\n  - has_check_config_notification
            = {{ has_check_config_notification }}\n"
      - *id001
      - if: '{{ "restart" in input_notification_select_notifications }}'
        then:
        - *id002
      else:
      - variables:
          log_message: 'The system is set to restart automatically when an update
            requires it.

            Restarting Home Assistant ({{ input_restart_type }})...

            '
      - *id001
      - if: '{{ "restart" in input_notification_select_notifications }}'
        then:
        - *id002
      - alias: Wait 15 seconds to deliver the telegram message.
        delay:
          seconds: 15
      - alias: Restart - Call reboot service
        continue_on_error: true
        action: '{{ "hassio.host_reboot" if input_restart_type == "host" else "homeassistant.restart"
          }}'
- alias: Post-update actions
  sequence:
  - variables:
      input_actions_pos_update: !input actions_pos_update
  - condition: '{{ input_actions_pos_update is sequence }}'
  - variables:
      log_message: Running post-update actions
  - *id001
  - if: '{{ "post_update_actions" in input_notification_select_notifications }}'
    then:
    - *id002
  - alias: Run post-update actions
    continue_on_error: true
    sequence: !input actions_pos_update
- alias: Set OFF helper flag
  if:
  - '{{ input_update_process_started_entity | default([]) | count > 0 }}'
  - '{{ input_update_process_started_entity[0] | string | length > 0 }}'
  then:
  - action: input_boolean.turn_off
    target:
      entity_id: !input update_process_started_entity
    continue_on_error: true
- alias: Done
  sequence:
  - variables:
      log_message: Done!
  - *id001
  - if: '{{ "done" in input_notification_select_notifications }}'
    then:
    - *id002

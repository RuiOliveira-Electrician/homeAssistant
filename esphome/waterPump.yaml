substitutions:
  slug: water_pump
  description: "Control of Water Pump!"
  wifi_static_ip: 192.168.1.103

  wifi_enabled_VPN: 0
  interfaces_enabled_api: 1
  interfaces_enabled_mqtt: 0

packages:
  board: !include boards/wemos_d1_mini.yaml
  <<:
    !include_dir_named packages/common

    # === TWO TRACKERS ===
  tracker: !include
    file: packages/sensors/templates/energy_template.yaml
    vars:
      tracker_id: tracker
      tracker_name: "Global"

  tracker_man: !include
    file: packages/sensors/templates/energy_template.yaml
    vars:
      tracker_id: tracker_man
      tracker_name: "MAN"

  tracker_auto: !include
    file: packages/sensors/templates/energy_template.yaml
    vars:
      tracker_id: tracker_auto
      tracker_name: "AUTO"

# === GLOBAL VARIABLES ===
globals:
  - { id: mode_state, type: int, restore_value: true, initial_value: "0" }

# === MODE SELECTOR ===
select:
  - platform: template
    name: "Mode"
    id: select_mode
    optimistic: true
    restore_value: true
    options: ["OFF", "MAN", "AUTO"]
    initial_option: "OFF"
    set_action:
      - lambda: |-
          if (x == "OFF") id(mode_state) = 0;
          else if (x == "MAN") id(mode_state) = 1;
          else if (x == "AUTO") id(mode_state) = 2;
          ESP_LOGI("mode", "Mode set to %s", x.c_str());

# === OUTPUT ===
switch:
  - platform: gpio
    id: contactor
    pin: D1
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

# === PRESSURE SENSOR ===
binary_sensor:
  - platform: gpio
    id: sensor_pressure
    name: "Pressure Sensor"
    pin: D2
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    on_press:
      then:
        - lambda: |-
            id(tracker_active) = 0;
            id(tracker_man_active) = 0;
            id(tracker_auto_active) = 0;

  - platform: template
    name: "Running"
    id: running
    device_class: power
    lambda: |-
      return id(contactor).state && !id(sensor_pressure).state;

  - platform: template
    name: "Using Surplus Energy"
    id: pump_surplus_usage
    icon: "mdi:leaf"
    device_class: power
    lambda: |-
      float available_power = id(sensor_power_meter_active_power).state;
      float pump_required_power = id(tracker_power_w) + 5;
      return available_power > pump_required_power && id(tracker_active);

# === CONFIGURABLE PUMP POWER ===
number:
  - platform: template
    name: "Power"
    id: pump_power
    icon: "mdi:flash"
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 5000
    step: 10
    initial_value: 1200
    optimistic: true
    restore_value: true
    set_action:
      - lambda: |-
          ESP_LOGI("pump", "Pump Power set to %.1f W", x);
    on_value:
      then:
        - lambda: |-
            id(tracker_power_w) = x;
            id(tracker_man_power_w) = x;
            id(tracker_auto_power_w) = x;
            ESP_LOGI("pump", "on_value triggered: %.1f", x);

# === SENSORS ===
text_sensor:
  - platform: template
    name: "Energy Source"
    id: pump_energy_source
    icon: "mdi:transmission-tower"


sensor:
  - platform: homeassistant
    id: sensor_inverter_active_power
    entity_id: sensor.inverter_active_power
    unit_of_measurement: "W"
    on_value:
      then:
        - lambda: |-
            id(last_ha_update) = millis();

  - platform: homeassistant
    id: sensor_power_meter_active_power
    entity_id: sensor.power_meter_active_power
    unit_of_measurement: "W"
    on_value:
      then:
        - lambda: |-
            id(last_ha_update) = millis();

interval:
  - interval: 2s
    then:
      - lambda: |-
          float p = id(pump_power).state;
          ESP_LOGW("tracker", "MAN active: %s", id(tracker_man_active) ? "true" : "false");
          ESP_LOGW("tracker", "tracker_man_power_w is %.1f", id(tracker_man_power_w));
          if (id(tracker_power_w) < 0) {
             ESP_LOGW("tracker", "tracker_power_w was invalid (%.1f) → fixing", id(tracker_power_w));
             id(tracker_power_w) = p;
           }

           if (id(tracker_man_power_w) < 0) {
             ESP_LOGW("tracker", "tracker_man_power_w was invalid (%.1f) → fixing", id(tracker_man_power_w));
             id(tracker_man_power_w) = p;
           }

           if (id(tracker_auto_power_w) < 0) {
             ESP_LOGW("tracker", "tracker_auto_power_w was invalid (%.1f) → fixing", id(tracker_auto_power_w));
             id(tracker_auto_power_w) = p;
           }
          // ====== UPDATE PUMP ACTIVE STATE ======
          float available_power = id(sensor_power_meter_active_power).state;
          float pump_required_power = id(tracker_power_w) + 5;


              
          // ====== SAFETY CHECK ======
          if (id(error_mask) != 0 && id(mode_state) != 1) {
              if (id(contactor).state) {
                  id(contactor).turn_off();
                  ESP_LOGW("safety", "HA Timeout → Pump OFF (safety mode)");
              }
          }

          // ====== MODE CONTROL ======
          switch (id(mode_state)) {
              case 0: // OFF
                  if (id(contactor).state) {
                      id(contactor).turn_off();
                      ESP_LOGI("mode", "OFF → Pump OFF");
                  id(tracker_auto_active) = id(running).state;
                  id(tracker_man_active) = id(running).state;
                  }
                  break;

              case 1: // MANUAL
                  if (!id(running).state) {   // <-- FIXED: added closing parenthesis
                      id(contactor).turn_on();
                      ESP_LOGI("mode", "MAN → Pump ON via Manual Tracker");
                  }
                  id(tracker_man_active) = id(running).state;
                  break;

              case 2: // AUTO
                  // Hysteresis to avoid rapid ON/OFF
                  if (available_power > pump_required_power && !id(running).state) {
                      id(contactor).turn_on();
                      ESP_LOGI("mode", "AUTO → Available %.1fW > Pump %.1fW → Pump ON", available_power, pump_required_power);
                  } else if ((available_power <= 0 && id(running).state)) {
                      id(contactor).turn_off();
                      ESP_LOGI("mode", "AUTO → Available %.1fW ≤ Pump %.1fW → Pump OFF", available_power, pump_required_power);
                  }
                  id(tracker_auto_active) = id(running).state;
                  break;
          }
          id(tracker_active) = id(running).state;

          // Energy source
          if (id(running).state) {
            id(pump_energy_source).publish_state(available_power > pump_required_power ? "Surplus" : "Grid");
          } else {
            id(pump_energy_source).publish_state("Idle");
          }

- id: '1737315230798'
  alias: Poll Huawei Solar and Power Meter Sensors
  description: Periodically updates inverter, power meter, and battery data
  triggers:
  - hours: '*'
    minutes: '*'
    seconds: /20
    id: trigger_poll_inverter
    trigger: time_pattern
    enabled: true
  - hours: '*'
    minutes: '*'
    seconds: /5
    id: trigger_poll_power_meter
    trigger: time_pattern
  - hours: '*'
    minutes: '*'
    seconds: /20
    id: trigger_poll_battery
    trigger: time_pattern
    enabled: false
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: trigger_poll_inverter
      sequence:
      - target:
          entity_id: sensor.inverter_daily_yield
        action: homeassistant.update_entity
        data:
          entity_id:
          - sensor.inverter_daily_yield
        enabled: true
    - conditions:
      - condition: trigger
        id: trigger_poll_power_meter
      sequence:
      - target:
          entity_id: sensor.power_meter_active_power
        action: homeassistant.update_entity
        data:
          entity_id:
          - sensor.power_meter_active_power
        enabled: true
    - conditions:
      - condition: trigger
        id: trigger_poll_battery
      sequence:
      - target:
          entity_id: sensor.battery_state_of_capacity
        action: homeassistant.update_entity
        data:
          entity_id:
          - sensor.battery_state_of_capacity
        enabled: true
  mode: queued
  max: 10
- id: '1741732744615'
  alias: MQTT Troubleshooting - Inverter Diagnostics
  description: Publishes inverter diagnostic values for debugging
  triggers:
  - entity_id: sensor.boiler_surplus_load
    id: trigger_boiler_load_change
    trigger: state
  - entity_id:
    - sensor.power_meter_active_power
    - sensor.inverter_pv_1_voltage
    - sensor.inverter_pv_1_current
    - sensor.inverter_pv_2_voltage
    - sensor.inverter_pv_2_current
    - sensor.inverter_input_power
    - sensor.inverter_solar_kw_use
    - sensor.inverter_internal_temperature
    id: trigger_inverter_state_change
    trigger: state
    enabled: true
  conditions: []
  actions:
  - data:
      topic: Inverter/power_meter_active_power
      payload: '{{ (states(''sensor.power_meter_active_power'') | float(0)) * -1 }}'
      qos: 0
      retain: false
    action: mqtt.publish
  - data:
      topic: Inverter/boiler_load
      payload: '{{ (states(''sensor.boiler_surplus_load'') | float(0)) }}'
      qos: 0
      retain: false
    action: mqtt.publish
  - data:
      topic: Inverter/memory_boiler_after_inverter_data_polling
      payload: '{{ (states(''input_number.memory_boiler_after_inverter_data_polling'')
        | float(0)) }}'
      qos: 0
      retain: false
    action: mqtt.publish
  mode: queued
  max: 10
- id: '1761918265815'
  alias: Boiler Mode Control (OFF/MAN/AUTO)
  description: Controls boiler mode based on MQTT, timer, and auto/manual input
  triggers:
  - trigger: time_pattern
    id: periodic_timer
    seconds: /5
    alias: Timer 5s
    enabled: true
  - trigger: state
    id: auto_mode_change
    entity_id:
    - input_boolean.boiler_control_auto
  - trigger: state
    entity_id:
    - select.boiler_mode
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - alias: 'OFF'
          condition: and
          conditions:
          - condition: state
            entity_id: input_boolean.boiler_control_auto
            state: 'on'
          - condition: or
            conditions:
            - alias: go off in MAN mode
              condition: and
              conditions:
              - condition: state
                entity_id: select.boiler_mode
                state: MAN
              - condition: or
                conditions:
                - condition: numeric_state
                  entity_id: sensor.boiler_heater_temperature
                  above: input_number.boiler_man_temperature
                - condition: and
                  conditions:
                  - alias: Inverter working
                    condition: not
                    conditions:
                    - condition: state
                      entity_id: sensor.inverter_inverter_state
                      state: unavailable
                  - condition: state
                    entity_id: sensor.energy_price_hours
                    state: highPrice
            - alias: go off in AUTO mode
              condition: and
              conditions:
              - condition: state
                entity_id: select.boiler_mode
                state: AUTO
              - condition: or
                conditions:
                - condition: state
                  entity_id: sensor.inverter_inverter_state
                  state: Standby
                - condition: state
                  entity_id: sensor.inverter_inverter_state
                  state: unavailable
                - condition: numeric_state
                  entity_id: sensor.boiler_heater_temperature
                  above: input_number.boiler_auto_temperature
            enabled: true
        - condition: trigger
          id:
          - auto_mode_change
          enabled: true
      sequence:
      - action: select.select_option
        metadata: {}
        data:
          option: 'OFF'
        target:
          entity_id: select.boiler_mode
      alias: 'OFF'
    - conditions:
      - condition: state
        entity_id: select.boiler_mode
        state: 'OFF'
      - condition: or
        conditions:
        - alias: MAN
          condition: and
          conditions:
          - condition: state
            entity_id: input_boolean.boiler_control_auto
            state: 'on'
          - condition: numeric_state
            entity_id: sensor.boiler_heater_temperature
            below: input_number.boiler_man_temperature
          - condition: and
            conditions:
            - condition: state
              entity_id: sensor.energy_price_hours
              state: lowPrice
            - condition: state
              entity_id: sensor.inverter_inverter_state
              state: Standby
            - condition: or
              conditions:
              - condition: state
                entity_id: input_boolean.boiler_control_by_solar_forecast
                state:
                - 'off'
              - condition: and
                conditions:
                - condition: state
                  entity_id: input_boolean.boiler_control_by_solar_forecast
                  state:
                  - 'on'
                - condition: or
                  conditions:
                  - condition: and
                    conditions:
                    - condition: numeric_state
                      entity_id: sensor.solar_production_forecast_estimated_energy_production_today
                      below: 5
                    - condition: time
                      after: 00:30:00
                      before: '12:00:00'
                  - condition: and
                    conditions:
                    - condition: numeric_state
                      entity_id: sensor.solar_production_forecast_estimated_energy_production_tomorrow
                      below: 5
                    - condition: time
                      after: '12:00:00'
                      before: '23:59:59'
        enabled: true
      sequence:
      - action: select.select_option
        metadata: {}
        data:
          option: MAN
        target:
          entity_id: select.boiler_mode
      alias: MAN
    - conditions:
      - condition: state
        entity_id: select.boiler_mode
        state: 'OFF'
      - condition: state
        entity_id: input_boolean.boiler_control_auto
        state: 'on'
      - condition: numeric_state
        entity_id: sensor.inverter_active_power
        above: 30
      - condition: numeric_state
        entity_id: sensor.boiler_heater_temperature
        below: input_number.boiler_auto_temperature
      sequence:
      - action: select.select_option
        metadata: {}
        data:
          option: AUTO
        target:
          entity_id: select.boiler_mode
      alias: AUTO
  mode: single
- id: '1766953516614'
  alias: Freeds reboot
  description: Reboot freeds if boiler error persists for 15 minutes
  triggers:
  - entity_id:
    - binary_sensor.boiler_error
    for:
      hours: 0
      minutes: 1
      seconds: 0
    trigger: state
  conditions:
  - condition: template
    value_template: "{{\n  'Mqtt' in states('sensor.boiler_error_type')\n   and 'Inverter'
      in states('sensor.boiler_error_type')\n   and 'Data' in states('sensor.boiler_error_type')\n}}\n"
  actions:
  - data:
      config_entry_id: 01KDXT6NCZEMGP1PYM6HAQ7S0R
      message: 'Boiler error has been active for 15 minutes. Freeds reboot button
        is being pressed.

        '
    action: telegram_bot.send_message
  - data:
      title: Freeds reboot triggered
      message: 'Boiler error has been active for 15 minutes. Freeds reboot button
        is being pressed.

        '
    action: persistent_notification.create
  - target:
      entity_id: button.boiler_reboot
    action: button.press
    data: {}
  mode: single
- id: '1766955395524'
  alias: Water Box Control
  description: Controls water box runtime, activation logic, and pump mode
  triggers:
  - minutes: /1
    id: trigger_increment_runtime
    trigger: time_pattern
  - trigger: time
    at: 00:00:00
    id: midnight_reset
  - entity_id:
    - binary_sensor.eletrical_bord_water_pump_switch_man
    - input_boolean.water_pump_forced_man
    id: water_pump_man
    trigger: state
  - entity_id:
    - select.water_pump_mode
    id: water_pump_mode_change
    trigger: state
    enabled: false
  - entity_id:
    - input_boolean.water_box_full
    id: water_box_Full
    trigger: state
  - entity_id:
    - input_boolean.water_box_control_auto
    id: water_box_control
    trigger: state
  conditions: []
  actions:
  - alias: Midnight Reset
    choose:
    - conditions:
      - condition: trigger
        id: midnight_reset
      sequence:
      - action: input_number.set_value
        data:
          value: 0
        target:
          entity_id: input_number.water_box_runtime
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.water_box_full
        data: {}
    enabled: true
  - alias: Increment Runtime While Pump Running
    choose:
    - conditions:
      - condition: trigger
        id: trigger_increment_runtime
      - condition: state
        entity_id: switch.boiler_relay_1
        state: 'on'
      - condition: or
        conditions:
        - condition: state
          entity_id: binary_sensor.water_pump_running
          state: 'on'
        - condition: state
          entity_id: binary_sensor.water_pump_pressure_sensor
          state:
          - 'on'
      sequence:
      - alias: Increment Water Box Runtime
        action: input_number.increment
        target:
          entity_id: input_number.water_box_runtime
    enabled: true
  - alias: Set Water Box Full When Runtime Finish
    choose:
    - conditions:
      - condition: trigger
        id: trigger_increment_runtime
      - condition: or
        conditions:
        - condition: and
          conditions:
          - condition: state
            entity_id: select.water_pump_mode
            state:
            - AUTO
          - condition: state
            entity_id: switch.boiler_relay_1
            state: 'on'
          - condition: state
            entity_id: binary_sensor.water_pump_pressure_sensor
            state: 'on'
            for:
              minutes: 1
        - condition: numeric_state
          entity_id: input_number.water_box_runtime
          above: input_number.water_box_time_factor
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.water_box_full
        data: {}
    enabled: true
  - alias: Auto Boiler Start Logic
    choose:
    - conditions:
      - condition: trigger
        id:
        - water_box_control
        - water_box_Full
        - water_pump_man
        - trigger_increment_runtime
      - condition: state
        entity_id: input_boolean.water_box_control_auto
        state: 'on'
      - condition: state
        entity_id: input_boolean.water_box_full
        state:
        - 'off'
      - condition: not
        conditions:
        - condition: or
          conditions:
          - condition: state
            entity_id: binary_sensor.eletrical_bord_water_pump_switch_man
            state: 'on'
          - condition: state
            entity_id: input_boolean.water_pump_forced_man
            state: 'on'
      - condition: or
        conditions:
        - condition: not
          conditions:
          - condition: state
            entity_id: select.water_pump_mode
            state:
            - AUTO
        - condition: state
          entity_id: switch.boiler_relay_1
          state: 'off'
      sequence:
      - alias: Set Water Pump Mode to AUTO
        action: select.select_option
        target:
          entity_id: select.water_pump_mode
        data:
          option: AUTO
      - alias: Turn On Boiler Relay
        action: switch.turn_on
        target:
          entity_id: switch.boiler_relay_1
  - alias: Auto Boiler Stop Logic
    choose:
    - conditions:
      - condition: trigger
        id:
        - water_box_Full
      - condition: state
        entity_id: input_boolean.water_box_control_auto
        state: 'on'
      - condition: state
        entity_id: input_boolean.water_box_full
        state:
        - 'on'
      - condition: not
        conditions:
        - condition: or
          conditions:
          - condition: state
            entity_id: binary_sensor.eletrical_bord_water_pump_switch_man
            state: 'on'
          - condition: state
            entity_id: input_boolean.water_pump_forced_man
            state: 'on'
      sequence:
      - alias: Set Water Pump Mode to OFF
        action: select.select_option
        target:
          entity_id: select.water_pump_mode
        data:
          option: 'OFF'
        enabled: true
      - alias: Turn Off Boiler Relay
        action: switch.turn_off
        target:
          entity_id: switch.boiler_relay_1
        data: {}
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - water_box_control
      - condition: state
        entity_id: input_boolean.water_box_control_auto
        state:
        - 'off'
      sequence:
      - alias: Set Water Pump Mode to OFF
        action: select.select_option
        target:
          entity_id: select.water_pump_mode
        data:
          option: 'OFF'
        enabled: true
      - alias: Turn Off Boiler Relay
        action: switch.turn_off
        target:
          entity_id: switch.boiler_relay_1
        data: {}
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - water_pump_man
      - condition: state
        entity_id: input_boolean.water_box_full
        state:
        - 'on'
      - alias: Water Pump MAN is OFF
        condition: and
        conditions:
        - condition: state
          entity_id: binary_sensor.eletrical_bord_water_pump_switch_man
          state: 'off'
        - condition: state
          entity_id: input_boolean.water_pump_forced_man
          state: 'off'
      sequence:
      - alias: Set Water Pump Mode to OFF
        action: select.select_option
        target:
          entity_id: select.water_pump_mode
        data:
          option: 'OFF'
        enabled: true
    enabled: true
  - alias: Force Manual Mode ON
    choose:
    - conditions:
      - condition: trigger
        id:
        - water_pump_man
      - condition: or
        conditions:
        - condition: state
          entity_id: binary_sensor.eletrical_bord_water_pump_switch_man
          state: 'on'
        - condition: state
          entity_id: input_boolean.water_pump_forced_man
          state: 'on'
      sequence:
      - alias: Set Water Pump Mode to MAN
        action: select.select_option
        target:
          entity_id: select.water_pump_mode
        data:
          option: MAN
      - alias: Turn Off Boiler Relay
        action: switch.turn_off
        target:
          entity_id: switch.boiler_relay_1
        data: {}
    enabled: true
  mode: restart
- id: '1766955433458'
  alias: Freeds – Publish Energy Snapshot (MQTT)
  description: Publishes inverter and power meter data to Freeds system
  triggers:
  - entity_id:
    - sensor.boiler_surplus_load
    - sensor.water_pump_power_global
    - sensor.power_meter_active_power
    - sensor.inverter_pv_1_voltage
    - sensor.inverter_pv_1_current
    - sensor.inverter_pv_2_voltage
    - sensor.inverter_pv_2_current
    - sensor.inverter_input_power
    - sensor.inverter_solar_kw_use
    - sensor.inverter_internal_temperature
    trigger: state
  actions:
  - alias: Publish GridWatts
    action: mqtt.publish
    data:
      topic: Inverter/GridWatts
      payload: "{{\n  (states('sensor.power_meter_active_power') | float(0)) * -1
        +\n  (states('sensor.boiler_surplus_load') | float(0)) +\n  (states('sensor.water_pump_power_global')
        | float(0)) -\n  (states('input_number.memory_boiler_after_inverter_data_polling')
        | float(0)) +\n  (states('input_number.boiler_adjustment_factor') | float(0))\n}}\n"
      qos: 1
      retain: true
  - alias: Publish MPPT1_Watts
    action: mqtt.publish
    data:
      topic: Inverter/MPPT1_Watts
      payload: "{{\n  (states('sensor.inverter_pv_1_voltage') | float(0)) *\n  (states('sensor.inverter_pv_1_current')
        | float(0))\n}}\n"
      qos: 1
      retain: true
  - alias: Publish MPPT1_Volts
    action: mqtt.publish
    data:
      topic: Inverter/MPPT1_Volts
      payload: '{{ states(''sensor.inverter_pv_1_voltage'') }}'
      qos: 1
      retain: true
  - alias: Publish MPPT1_Amps
    action: mqtt.publish
    data:
      topic: Inverter/MPPT1_Amps
      payload: '{{ states(''sensor.inverter_pv_1_current'') }}'
      qos: 1
      retain: true
  - alias: Publish MPPT2_Watts
    action: mqtt.publish
    data:
      topic: Inverter/MPPT2_Watts
      payload: "{{\n  (states('sensor.inverter_pv_2_voltage') | float(0)) *\n  (states('sensor.inverter_pv_2_current')
        | float(0))\n}}\n"
      qos: 1
      retain: true
  - alias: Publish MPPT2_Volts
    action: mqtt.publish
    data:
      topic: Inverter/MPPT2_Volts
      payload: '{{ states(''sensor.inverter_pv_2_voltage'') }}'
      qos: 1
      retain: true
  - alias: Publish MPPT2_Amps
    action: mqtt.publish
    data:
      topic: Inverter/MPPT2_Amps
      payload: '{{ states(''sensor.inverter_pv_2_current'') }}'
      qos: 1
      retain: true
  - alias: Publish PvWattsTotal
    action: mqtt.publish
    data:
      topic: Inverter/PvWattsTotal
      payload: '{{ states(''sensor.inverter_input_power'') }}'
      qos: 1
      retain: true
  - alias: Publish SolarKwUse
    action: mqtt.publish
    data:
      topic: Inverter/SolarKwUse
      payload: '{{ states(''sensor.inverter_solar_kw_use'') }}'
      qos: 1
      retain: true
  - alias: Publish Temperature
    action: mqtt.publish
    data:
      topic: Inverter/Temperature
      payload: '{{ states(''sensor.inverter_internal_temperature'') }}'
      qos: 1
      retain: true
  - alias: Update Boiler Memory
    action: input_number.set_value
    target:
      entity_id: input_number.memory_boiler_after_inverter_data_polling
    data:
      value: "{{\n  (states('sensor.boiler_surplus_load') | float(0)) +\n  (states('sensor.water_pump_power_global')
        | float(0))\n}}\n"
  mode: queued
  max: 10

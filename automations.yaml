- id: '1772573658000'
  alias: Energy Tariff 08-22 Peak
  description: Sets peak tariff from 08:00 to 22:00 and offpeak for the remaining
    hours.
  triggers:
  - trigger: time
    at: 08:00:00
    variables:
      tariff: peak
  - trigger: time
    at: '22:00:00'
    variables:
      tariff: offpeak
  conditions: []
  actions:
  - action: select.select_option
    target:
      entity_id:
      - select.daily_energy
      - select.monthly_energy
    data:
      option: '{{ tariff }}'
  mode: single
